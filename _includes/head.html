<head>
    <title>{% if page.title!=null %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/main.css" />
    <link rel="icon" href="{{site.baseurl}}/images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/syntax.css" />

    {% if site.gitalk.enable and page.title %}
    <!-- Gitalk -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css">
    <script src="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js"></script>
    {% endif %}

    {% if site.mathjax.enable and page.title %}
    <!-- MathJax -->
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            tex2jax: {
            skipTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
            inlineMath: [['$','$']]
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML"
        type="text/javascript"></script>
    {% endif %}

    {% if site.jekyll-mermaid.enable %}
    <!-- Mermaid -->
    <script src="{{site.baseurl}}/assets/js/mermaid.min.js"></script>
    {% endif %}

    <!-- 感谢jsdelivr、baomitu(57CDN)提供的免费webfont cdn服务 -->
    <link crossorigin="anonymous"
        integrity="sha512-Fzvxn9FrR1aKr/Z4Pg9KpnVHCsJoq2QwSu1juU2oQ6wDUkUMk3qQUUWKgFjk0m0LzCamIJVOkg5zeyNX5I1wgA=="
        href="https://lib.baomitu.com/lxgw-wenkai-webfont/latest/lxgwwenkai-regular.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-sc@5.0.16/index.min.css">
</head>
