<article class="post" id="header-search-results-article" style="display: none;">
    <header>
        <div class="title">
            <h2>{{ site.data.locales[site.localization].search-results }}</h2> <!-- 标题/title -->
            <p>
                Powered by:
                <a href="https://github.com/christian-fei/Simple-Jekyll-Search">Simple-Jekyll-Search</a>
            </p>
        </div>
        <div class="meta">
            <p class="published">{{ site.data.locales[site.localization].display-limit }}: {{ site.simple-jekyll-search.result_limit }}</p>
        </div>
    </header>
    <div class="content"> <!-- 内容预览 -->
        <ul id="header-search-results-ul" class="links"></ul>
    </div>
</article>
