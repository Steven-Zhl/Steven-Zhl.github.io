{% if page.mathjax == true %}
<!-- MathJax -->
<script>
  window.MathJax = {
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
    loader: { load: ['input/tex', 'output/svg'] },
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    svg: { fontCache: 'global' }
  };
</script>
{% elsif page.mathjax == nil and site.mathjax.enable == true %}
<!-- MathJax -->
<script>
  window.MathJax = {
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
    loader: { load: ['input/tex', 'output/svg'] },
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    svg: { fontCache: 'global' }
  };
</script>
{% endif %}
